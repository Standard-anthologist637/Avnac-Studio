name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  build-linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: wails build -clean

      - name: Rename Linux binary
        run: |
          mkdir -p build/bin/renamed
          mv build/bin/Avnac build/bin/renamed/Avnac-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-amd64
          path: build/bin/renamed/*


  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: wails build -clean

      - name: Build macOS (DMG enabled)
        run: wails build -clean -platform darwin/universal

      - name: Move DMG
        run: |
            mkdir -p build/bin/renamed
            find build/bin -name "*.dmg" -exec mv {} build/bin/renamed/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: build/bin/renamed/*.dmg


  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: wails build -clean -nsis

      - name: Rename Windows outputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\bin\renamed
          Move-Item build\bin\Avnac.exe build\bin\renamed\Avnac-windows-amd64.exe
          $installer = Get-ChildItem build\bin\*installer.exe -ErrorAction SilentlyContinue
          if ($installer) {
            Move-Item $installer.FullName build\bin\renamed\Avnac-windows-installer.exe
          }

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-amd64
          path: build/bin/renamed/*


  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-amd64
      - build-macos
      - build-windows-amd64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURR_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')

          echo "## What's Changed" > commit_log.md
          echo "" >> commit_log.md
          if [ -n "$PREV_TAG" ]; then
            echo "Changes since \`${PREV_TAG}\`:" >> commit_log.md
            echo "" >> commit_log.md
            RANGE="${PREV_TAG}..${CURR_TAG}"
          else
            RANGE="${CURR_TAG}"
          fi

          USERS_FILE=$(mktemp)

          while IFS= read -r HASH; do
            [ -z "$HASH" ] && continue
            MSG=$(git log -1 --pretty=format:"%s" "$HASH")
            SHORT="${HASH:0:7}"
            GH_LOGIN=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${HASH}" \
              | jq -r '.author.login // empty' 2>/dev/null || echo "")
            if [ -n "$GH_LOGIN" ]; then
              echo "- ${MSG} — @${GH_LOGIN} (\`${SHORT}\`)" >> commit_log.md
              echo "$GH_LOGIN" >> "$USERS_FILE"
            else
              echo "- ${MSG} (\`${SHORT}\`)" >> commit_log.md
            fi
          done < <(git log "$RANGE" --pretty=format:"%H" --no-merges)

          echo "" >> commit_log.md

          if [ -s "$USERS_FILE" ]; then
            echo "---" >> commit_log.md
            echo "" >> commit_log.md
            echo "### Contributors" >> commit_log.md
            echo "" >> commit_log.md
            echo "<table><tr>" >> commit_log.md
            for USER in $(sort -u "$USERS_FILE"); do
              printf '  <td align="center"><a href="https://github.com/%s"><img src="https://github.com/%s.png?size=72" width="72" height="72" style="border-radius:50%%" /><br /><b>@%s</b></a></td>\n' \
                "$USER" "$USER" "$USER" >> commit_log.md
            done
            echo "</tr></table>" >> commit_log.md
            echo "" >> commit_log.md
          fi

          rm -f "$USERS_FILE"

      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: commit_log.md
          files: binaries/*